# Proxy interno del stack (detrás de Traefik/Coolify, que termina TLS).
#
# Se usan bloques upstream con resolve + keepalive:
# - resolve: re-resuelve DNS de backend/frontend cada 10s, evitando que un
#   redeploy deje nginx apuntando a IPs muertas (problema original que forzó
#   el uso de variables).
# - keepalive: mantiene conexiones TCP persistentes, reduciendo latencia y
#   evitando que Gunicorn se sature abriendo/cerrando conexiones por request.
#
# Tras cambiar esta conf en caliente: `docker restart` del contenedor
# (un `nginx -s reload` dejó conexiones colgadas con Traefik → 504s).

resolver 127.0.0.11 valid=10s ipv6=off;

# Upstreams con resolución dinámica y conexiones persistentes
upstream django_backend {
    zone django_backend 64k;
    server backend:8000 resolve;
    keepalive 32;
}

upstream frontend_backend {
    zone frontend_backend 64k;
    server frontend:80 resolve;
    keepalive 32;
}

# Rate limiting: evitar picos que saturen Gunicorn
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Headers de proxy (heredados por locations que no los sobreescriban)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ── API Django ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=100 nodelay;

        proxy_pass http://django_backend;

        proxy_http_version 1.1;
        # Connection "" permite que nginx reutilice la conexión del keepalive
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;   # 128k total — suficiente para respuestas JSON grandes

        proxy_next_upstream error timeout http_502 http_503;
    }

    # ── Django Admin (renombrado para no colisionar con /admin de React) ──────
    location /sys-admin/ {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://django_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_next_upstream error timeout http_502 http_503;
    }

    # ── Archivos media ────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Archivos estáticos (Django) ───────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://frontend_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # SPA routing
        error_page 404 =200 /index.html;
    }
}
