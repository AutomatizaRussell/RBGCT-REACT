# Proxy interno del stack (detrás de Traefik/Coolify, que termina TLS).
#
# IMPORTANTE (504s): no usar bloques `upstream` con nombres de servicio.
# nginx resuelve el DNS de un upstream UNA sola vez al cargar la config;
# si Coolify recrea el backend/frontend con otra IP, nginx queda apuntando
# a una IP muerta y todo responde 504 hasta reiniciarlo. Con variables +
# resolver, la IP se re-resuelve cada 10s y los redeploys no lo rompen.
#
# Tras cambiar esta conf en caliente: `docker restart` del contenedor
# (un `nginx -s reload` dejó conexiones colgadas con Traefik → 504s).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Headers de proxy (heredados por locations que no los sobreescriban)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ── API Django ────────────────────────────────────────────────────────────
    location /api/ {
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;

        proxy_http_version 1.1;
        # Cualquier proxy_set_header en un location cancela la herencia del
        # bloque server, por eso se repiten todos explícitamente.
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;   # 128k total — suficiente para respuestas JSON grandes
    }

    # ── Django Admin (renombrado para no colisionar con /admin de React) ──────
    location /sys-admin/ {
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Archivos media ────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Archivos estáticos (Django) ───────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        set $react_upstream http://frontend:80;
        proxy_pass $react_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 10s;
        error_page 404 =200 /index.html;
    }
}
