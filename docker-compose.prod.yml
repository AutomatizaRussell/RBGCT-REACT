services:
  # ── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rbgct-redis-prod
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - conecta-network-prod
    deploy:
      resources:
        limits:
          memory: 384m   # 256mb datos + overhead OS; ajustar según VPS
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rbgct-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # POSTGRES_INITDB_ARGS solo aplica en la creación inicial del cluster;
      # para tuning en DB existente usar el parámetro `command:` abajo.
      POSTGRES_INITDB_ARGS: "-c shared_buffers=512MB -c max_connections=200"
    # Tuning aplicado en cada inicio (válido para DB existente)
    command: >
      postgres
        -c shared_buffers=512MB
        -c max_connections=200
        -c random_page_cost=1.1
        -c effective_cache_size=1GB
        -c wal_buffers=16MB
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - conecta-network-prod
    deploy:
      resources:
        limits:
          memory: 1g    # shared_buffers=512MB + conexiones + overhead
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Django Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rbgct-backend-prod
    restart: always
    # Usuario no-root (UID/GID 1001 creado en Dockerfile.backend).
    # NOTA: en primer despliegue con este cambio, si los volúmenes existentes
    # fueron creados por root, ejecutar una vez:
    #   docker exec -u root rbgct-backend-prod chown -R 1001:1001 /app/staticfiles /app/media
    # user: "1001:1001"
    command: >
      sh -c "python manage.py migrate --noinput && python create_superadmin.py && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --worker-class sync --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-120} --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile - rbgct.wsgi:application"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-conecta-gct.rbgct.cloud,.rbgct.cloud,localhost,127.0.0.1,host.docker.internal,backend,nginx}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://conecta-gct.rbgct.cloud}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://conecta-gct.rbgct.cloud}
      FRONTEND_URL: ${FRONTEND_URL:-https://conecta-gct.rbgct.cloud}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APPWRITE_ENDPOINT: ${APPWRITE_ENDPOINT}
      APPWRITE_PROJECT_ID: ${APPWRITE_PROJECT_ID}
      APPWRITE_BUCKET_ID: ${APPWRITE_BUCKET_ID}
      APPWRITE_API_KEY: ${APPWRITE_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_WEBHOOK_API_KEY: ${N8N_WEBHOOK_API_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@rbgct.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      CACHE_BACKEND: ${CACHE_BACKEND:-redis}
      CACHE_DIR: ${CACHE_DIR:-/tmp/django_cache}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-120}
      DB_CONN_HEALTH_CHECKS: ${DB_CONN_HEALTH_CHECKS:-True}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - media_volume_prod:/app/media
      - static_volume_prod:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/health/',timeout=8); exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta-network-prod
    deploy:
      resources:
        limits:
          memory: 900m  # 4 workers × ~200m + overhead; ajustar según VPS
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── React Frontend (nginx estático) ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: rbgct-frontend-prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - conecta-network-prod
    deploy:
      resources:
        limits:
          memory: 128m  # nginx sirviendo archivos estáticos: muy liviano
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: rbgct-nginx-prod
    restart: always
    # Coolify gestiona dominio, TLS y routers desde la UI. Esta etiqueta sí es
    # necesaria porque nginx queda unido a la red interna y a la de ingreso;
    # sin ella Traefik puede escoger la IP interna y responder 504.
    labels:
      - traefik.docker.network=n10dvijz47as7ci0jt97btt2
    volumes:
      - 'media_volume_prod:/app/media:ro'
      - 'static_volume_prod:/app/staticfiles:ro'
    expose:
      - '80'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/api/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - conecta-network-prod
    deploy:
      resources:
        limits:
          memory: 64m   # nginx proxy: footprint mínimo
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  media_volume_prod:
    driver: local
  static_volume_prod:
    driver: local

networks:
  conecta-network-prod:
    driver: bridge
