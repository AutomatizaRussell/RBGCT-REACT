version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: rbgct-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=512MB -c max_connections=400 -c random_page_cost=1.1"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gct-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rbgct-backend-prod
    restart: always
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 8 --worker-class sync --timeout 120 --access-logfile - --error-logfile - rbgct.wsgi:application"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-rbgct.cloud,www.rbgct.cloud}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://rbgct.cloud,https://www.rbgct.cloud}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://rbgct.cloud,https://www.rbgct.cloud}
      FRONTEND_URL: ${FRONTEND_URL:-https://rbgct.cloud}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APPWRITE_ENDPOINT: ${APPWRITE_ENDPOINT}
      APPWRITE_PROJECT_ID: ${APPWRITE_PROJECT_ID}
      APPWRITE_BUCKET_ID: ${APPWRITE_BUCKET_ID}
      APPWRITE_API_KEY: ${APPWRITE_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_WEBHOOK_API_KEY: ${N8N_WEBHOOK_API_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@rbgct.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    volumes:
      - media_volume_prod:/app/media
      - static_volume_prod:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gct-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: rbgct-frontend-prod
    restart: always
    networks:
      - gct-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (SSL terminado por Nginx Proxy Manager en el host)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: rbgct-nginx-prod
    restart: always
    volumes:
      - 'media_volume_prod:/app/media:ro'
      - 'static_volume_prod:/app/staticfiles:ro'
    expose:
      - '80'
    depends_on:
      - backend
      - frontend
    networks:
      - gct-network-prod
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  postgres_data_prod:
    driver: local
  media_volume_prod:
    driver: local
  static_volume_prod:
    driver: local

networks:
  gct-network-prod:
    driver: bridge
