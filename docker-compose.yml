version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: rbgct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rbgct}
      POSTGRES_USER: ${DB_USER:-rbgct}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rbgct123}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rbgct}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rbgct-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: sh -c "python manage.py migrate --noinput && python create_superadmin.py && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 rbgct.wsgi:application"
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - conecta-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rbgct-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "5173:80"
    networks:
      - conecta-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rbgct-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume:/app/media:ro
      - static_volume:/app/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - conecta-network

volumes:
  postgres_data:
    driver: local
  media_volume:
    driver: local
  static_volume:
    driver: local

networks:
  conecta-network:
    driver: bridge